<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloomway Transit | Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink-900: #1b2633;
      --ink-800: #293645;
      --ink-700: #435667;
      --cream: #f8fafc;
      --white: #ffffff;
      --slate: #5b7185;
      --accent: #e6b437;
      --accent-glow: rgba(230, 180, 55, 0.4);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: linear-gradient(180deg, #f2f5f8 0%, #f8fafd 36%, #eef3f7 100%);
      color: var(--ink-900);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    
    /* Background Elements */
    .bg-grid {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image: 
        linear-gradient(rgba(7, 63, 77, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(7, 63, 77, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
    }

    .orb-1, .orb-2 {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.6;
      animation: drift 20s infinite alternate ease-in-out;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: rgba(67, 86, 103, 0.15);
      top: -10%;
      left: -10%;
    }

    .orb-2 {
      width: 300px;
      height: 300px;
      background: rgba(230, 180, 55, 0.2);
      bottom: -10%;
      right: -10%;
      animation-duration: 25s;
      animation-direction: alternate-reverse;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, -50px) scale(1.1); }
    }

    /* Main Container */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3rem;
      max-width: 800px;
      width: 90%;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(8, 71, 86, 0.1);
      border-radius: 30px;
      box-shadow: 0 30px 60px rgba(4, 49, 61, 0.09);
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }
    
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo */
    .logo-container {
      margin-bottom: 2rem;
      display: inline-block;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(4, 49, 61, 0.09), 0 0 0 1px rgba(8, 71, 86, 0.05);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .logo-container:hover {
      transform: translateY(-5px) scale(1.02);
    }

    .logo {
      height: 80px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    /* Typography */
    .pill {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      background: rgba(230, 180, 55, 0.15);
      color: var(--accent);
      border: 1px solid rgba(230, 180, 55, 0.3);
      border-radius: 999px;
      font-family: 'Sora', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      margin-bottom: 1rem;
      line-height: 1.1;
      background: linear-gradient(to right, var(--ink-900), var(--ink-700));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 30px rgba(4, 49, 61, 0.1);
    }

    p.subtitle {
      font-size: clamp(1.1rem, 2vw, 1.3rem);
      color: var(--slate);
      line-height: 1.6;
      margin-bottom: 2.5rem;
      max-width: 600px;
      margin-inline: auto;
    }

    /* Contact Details */
    .contact-info {
      display: inline-flex;
      flex-direction: column;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.7);
      padding: 1.5rem 2.5rem;
      border-radius: 16px;
      border: 1px solid rgba(8, 71, 86, 0.1);
    }

    .contact-info a {
      color: var(--accent);
      text-decoration: none;
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
    }

    .contact-info a:hover {
      color: var(--ink-800);
      text-shadow: 0 0 10px rgba(230, 180, 55, 0.3);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 2rem 1.5rem;
      }
      .logo {
        height: 60px;
      }
      .contact-info {
        padding: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb-1"></div>
  <div class="orb-2"></div>

  <div class="container">
    <div class="logo-container">
      <img src="/bloomwaylogo.png" alt="Bloomway Transit Logo" class="logo" onerror="this.src='https://placehold.co/400x120/ffffff/1b2633?text=Bloomway+Transit'">
    </div>
    
    <div class="pill">Under Construction</div>
    
    <h1>Something great <br> is on the way.</h1>
    
    <p class="subtitle">
      We are currently building a new experience for Bloomway Transit. Our business operations will be commencing soon. Thank you for your patience!
    </p>

    <div class="contact-info">
      <span style="color: var(--slate); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: -0.5rem;">Reach out to us</span>
      <a href="mailto:info@bloomwaytransit.com">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
        info@bloomwaytransit.com
      </a>
    </div>
  </div>
</body>
</html>
